<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sharif Ruzaimi — Software Developer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<style>
  :root {
    /* Editorial palette — light */
    --bg: #e9e4e0;
    --bg-2: #f3eee9;
    --ink: #172a39;
    --ink-dim: rgba(23, 42, 57, 0.62);
    --ink-faint: rgba(23, 42, 57, 0.38);
    --cherry: #fc563c;
    --orange: #fc563c;
    --amber: #fc563c;
    --pink: rgba(252, 86, 60, 0.22);
    --cream: #e9e4e0;
    --slate: #6e7575;
    --navy: #172a39;
    --line: rgba(23, 42, 57, 0.10);
    --cyan: #fc563c;
  }
  [data-theme="dark"] {
    --bg: #0d1822;
    --bg-2: #14222e;
    --ink: #f0eae4;
    --ink-dim: rgba(240, 234, 228, 0.62);
    --ink-faint: rgba(240, 234, 228, 0.38);
    --cherry: #ff6e54;
    --orange: #ff6e54;
    --amber: #ff6e54;
    --line: rgba(240, 234, 228, 0.10);
    --cyan: #ff6e54;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Space Grotesk', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    transition: background-color 0.4s ease, color 0.4s ease;
  }
  body {
    background-color: var(--bg);
    background-image:
      radial-gradient(ellipse at 12% 0%, rgba(252, 86, 60, 0.10), transparent 55%),
      radial-gradient(ellipse at 88% 100%, rgba(23, 42, 57, 0.05), transparent 55%);
    min-height: 100vh;
  }
  [data-theme="dark"] body {
    background-image:
      radial-gradient(ellipse at 12% 0%, rgba(255, 110, 84, 0.12), transparent 55%),
      radial-gradient(ellipse at 88% 100%, rgba(240, 234, 228, 0.04), transparent 55%);
  }
  ::selection { background: var(--cherry); color: var(--bg); }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .serif { font-family: 'Instrument Serif', serif; }

  /* Loading splash */
  #boot {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999; transition: opacity 0.5s;
    font-family: 'JetBrains Mono', monospace;
    color: var(--ink-dim); font-size: 13px;
  }
  #boot.gone { opacity: 0; pointer-events: none; }
  #boot .dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--cherry); margin-right: 10px; animation: pulse 1s infinite;
  }
  @keyframes pulse { 50% { opacity: 0.3; } }
</style>
</head>
<body>
<div id="boot"><span class="dot"></span>booting sharif.dev …</div>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="keyboard.jsx"></script>
<script type="text/babel" src="sections.jsx"></script>
<script type="text/babel" src="blog.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
